name: Build and Artifacts

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow YAML syntax
        run: |
          ruby -e "require 'yaml'; Dir['.github/workflows/*.yml'].each { |f| YAML.load_file(f); puts \"OK #{f}\" }"

  compile-smoke-and-artifacts:
    runs-on: ubuntu-latest
    needs: validate-workflows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            git \
            libglib2.0-dev \
            libpixman-1-dev \
            zlib1g-dev \
            libfdt-dev \
            libcapstone-dev \
            libslirp-dev

      - name: Configure (x86_64-softmmu)
        run: |
          ./configure \
            --target-list=x86_64-softmmu \
            --disable-werror \
            --disable-docs \
            --disable-gtk \
            --disable-sdl \
            --disable-curses \
            --disable-vnc-jpeg

      - name: Compile smoke target
        run: |
          ninja -C build subprojects/libvhost-user/libvhost-user.a

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp -v build/subprojects/libvhost-user/libvhost-user.a artifacts/
          cp -v build/config.log artifacts/
          cp -v build/config-host.h artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-smoke-build-artifacts
          path: artifacts/
          if-no-files-found: error
